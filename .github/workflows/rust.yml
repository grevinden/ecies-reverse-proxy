name: Rust

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build all workspace members
        run: cargo build --workspace --release --verbose

      - name: Run tests
        run: cargo test --workspace --verbose

  docker:
    needs: build
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # обязательно для публикации в GitHub Packages
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.CR_PAT }}  # ваш сохранённый PAT

      - name: Build and push ecies-proxy
        uses: docker/build-push-action@v6
        with:
          context: ./ecies-proxy
          push: true  # теперь включаем push
          tags: ghcr.io/${{ github.repository }}/ecies-proxy:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
