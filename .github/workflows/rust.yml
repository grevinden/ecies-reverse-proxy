name: Rust

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build ecies-proxy
        run: cargo build -p ecies-reverse-proxy --release --verbose

      - name: Run tests
        run: cargo test -p ecies-reverse-proxy --verbose

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ecies-proxy-linux-amd64
          path: target/release/ecies_proxy

  docker:
    needs: build
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Download binary artifact
        uses: actions/download-artifact@v4
        with:
          name: ecies-proxy-linux-amd64
          path: ./ecies-proxy/target/release/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.CR_PAT }}

      - name: Build and push ecies-proxy
        uses: docker/build-push-action@v6
        with:
          context: .  # корень репозитория, если Dockerfile там же
          file: ./Dockerfile  # ЯВНО указываем путь к Dockerfile в корне
          push: true
          tags: ghcr.io/${{ github.repository }}/ecies-proxy:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
